services:
  db:
    image: postgres:16
    container_name: leaderboard-db
    environment:
      POSTGRES_DB: leaderboard_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d leaderboard_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
    container_name: leaderboard-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: leaderboard_db
      DB_USER: username
      DB_PASSWORD: password
      DB_HOST: db
      DB_PORT: 5432
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_RELOAD: "false"
      AUTO_INIT_DB: "true"
      JWT_SECRET: change-me-in-production-please-use-a-long-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      DB_WAIT_TIMEOUT_SECONDS: 90
      DB_WAIT_INTERVAL_SECONDS: 1
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
